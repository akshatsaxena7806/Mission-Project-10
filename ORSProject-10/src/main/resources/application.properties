server.port = 8080


page.size =5 

#spring data source
spring.datasource.driver-class-name= com.mysql.cj.jdbc.Driver
spring.datasource.url= jdbc:mysql://localhost:3306/project_10
spring.datasource.username=root
spring.datasource.password=root


#hibernate/jpa properties
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


#hibernate DDL atuo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.dialect=org.hibernate.dialect.MariaDB53Dialect
spring.jpa.hibernate.current_session_context-class=org.springfreamework.orm.hibernate.SpringSessionContext