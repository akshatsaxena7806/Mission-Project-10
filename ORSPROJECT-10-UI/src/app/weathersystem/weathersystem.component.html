<style>
  .hm {
    background-image: url('assets/img/welcome.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 150px;
    padding-bottom: 150px;
  }
</style>

<app-navbar></app-navbar>

<div class="hm">

  <div class="row">
    <div class="col-md-4"></div>

    <div class="col-md-4">
      <div class="card input-group-addon">
        <div class="card-body">

          <!-- Title -->
          <h3 class="text-center text-primary" *ngIf="!form.data.id">
            Add Weather System
          </h3>

          <h3 class="text-center text-primary" *ngIf="form.data.id > 0">
            Update Weather System
          </h3>

          <!-- Success Message -->
          <div *ngIf="!form.error && form.message"
               class="alert alert-success text-center">
            {{ form.message }}
          </div>

          <!-- Error Message -->
          <div *ngIf="form.error && form.message"
               class="alert alert-danger text-center">
            {{ form.message }}
          </div>

          <!-- City Name -->
          <span><b>City Name</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-city"></i>
              </div>
            </div>
            <input type="text"
                   class="form-control"
                   name="cityName"
                   [(ngModel)]="form.data.cityName"
                   placeholder="Enter City Name">
          </div>
          <small class="text-danger">
            {{ form.inputerror.cityName }}
          </small>

          <!-- Temperature -->
          <span class="mt-2 d-block">
            <b>Temperature</b> <span style="color:red">*</span>
          </span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-thermometer-half"></i>
              </div>
            </div>
            <input type="number"
                   class="form-control"
                   name="temperature"
                   [(ngModel)]="form.data.temperature"
                   placeholder="Enter Temperature">
          </div>
          <small class="text-danger">
            {{ form.inputerror.temperature }}
          </small>

          <!-- Humidity -->
          <span class="mt-2 d-block">
            <b>Humidity</b> <span style="color:red">*</span>
          </span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-tint"></i>
              </div>
            </div>
            <input type="number"
                   class="form-control"
                   name="humidity"
                   [(ngModel)]="form.data.humidity"
                   placeholder="Enter Humidity">
          </div>
          <small class="text-danger">
            {{ form.inputerror.humidity }}
          </small>

          <!-- Climate -->
          <span class="mt-2 d-block">
            <b>Climate</b> <span style="color:red">*</span>
          </span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-cloud"></i>
              </div>
            </div>
            <select class="form-control"
                    name="climate"
                    [(ngModel)]="form.data.climate">
              <option value="undefined">
                ------------Select------------
              </option>
              <option value="Sunny">Sunny</option>
              <option value="Rainy">Rainy</option>
              <option value="Cloudy">Cloudy</option>
              <option value="Stormy">Stormy</option>
              <option value="Snowy">Snowy</option>
            </select>
          </div>
          <small class="text-danger">
            {{ form.inputerror.climate }}
          </small>

          <!-- Buttons -->
          <div class="text-center mt-3">

            <button class="btn btn-success btn-md"
                    (click)="submit()">
              Save
            </button>

            &nbsp;

            <button class="btn btn-warning btn-md"
                    (click)="forward('Weatherlist')">
              List
            </button>

          </div>

        </div>
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>

</div>

<app-footer></app-footer>
