<style>
  .hm {
    background-image: url('assets/img/welcome.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 150px;
    padding-bottom: 150px;
  }
</style>

<app-navbar></app-navbar>

<div class="hm">

  <div class="row">
    <div class="col-md-4"></div>

    <div class="col-md-4">
      <div class="card input-group-addon">
        <div class="card-body">

          <!-- Title -->
          <h3 class="text-center text-primary" *ngIf="!form.data.id">
            Add Gender
          </h3>

          <h3 class="text-center text-primary" *ngIf="form.data.id > 0">
            Update Gender
          </h3>

          <!-- Success Message -->
          <div *ngIf="!form.error && form.message"
               class="alert alert-success text-center">
            {{ form.message }}
          </div>

          <!-- Error Message -->
          <div *ngIf="form.error && form.message"
               class="alert alert-danger text-center">
            {{ form.message }}
          </div>

          <!-- Gender Code -->
          <span><b>Gender Code</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-code"></i>
              </div>
            </div>

            <input type="text"
                   class="form-control"
                   name="genderCode"
                   [(ngModel)]="form.data.genderCode"
                   placeholder="Enter Gender Code">
          </div>

          <small class="text-danger">
            {{ form.inputerror.genderCode }}
          </small>

          <!-- Gender Type -->
          <span class="mt-2 d-block">
            <b>Gender Type</b> <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-venus-mars"></i>
              </div>
            </div>

            <input type="text"
                   class="form-control"
                   name="genderType"
                   [(ngModel)]="form.data.genderType"
                   placeholder="Enter Gender Type">
          </div>

          <small class="text-danger">
            {{ form.inputerror.genderType }}
          </small>

          <!-- Description -->
          <span class="mt-2 d-block">
            <b>Description</b> <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-align-left"></i>
              </div>
            </div>

            <textarea class="form-control"
                      name="description"
                      [(ngModel)]="form.data.description"
                      placeholder="Enter Description">
            </textarea>
          </div>

          <small class="text-danger">
            {{ form.inputerror.description }}
          </small>

          <!-- Status -->
          <span class="mt-2 d-block">
            <b>Status</b> <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-toggle-on"></i>
              </div>
            </div>

            <select class="form-control"
                    name="status"
                    [(ngModel)]="form.data.status">

              <option value="undefined">
                ------------Select------------
              </option>

              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>

            </select>
          </div>

          <small class="text-danger">
            {{ form.inputerror.status }}
          </small>

          <!-- Buttons -->
          <div class="text-center mt-3">

            <button class="btn btn-success btn-md"
                    (click)="submit()">
              Save
            </button>

            &nbsp;

            <button class="btn btn-warning btn-md"
                    (click)="forward('genderlist')">
              List
            </button>

          </div>

        </div>
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>

</div>

<app-footer></app-footer>
