<style>
  .hm {
    background-image: url('assets/img/welcome.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 150px;
    padding-bottom: 150px;
  }
</style>

<app-navbar></app-navbar>

<div class="hm">

  <div class="row">
    <div class="col-md-4"></div>

    <div class="col-md-4">
      <div class="card input-group-addon">
        <div class="card-body">

          <!-- Title -->
          <h3 class="text-center text-primary" *ngIf="!form.data.id">
            Add Achievement Badge
          </h3>

          <h3 class="text-center text-primary" *ngIf="form.data.id > 0">
            Update Achievement Badge
          </h3>

          <!-- Success Message -->
          <div *ngIf="!form.error && form.message"
               class="alert alert-success text-center">
            {{ form.message }}
          </div>

          <!-- Error Message -->
          <div *ngIf="form.error && form.message"
               class="alert alert-danger text-center">
            {{ form.message }}
          </div>

          <!-- Badge Code -->
          <span>
            <b>Badge Code</b> <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-id-badge"></i>
              </div>
            </div>

            <input type="text"
                   class="form-control"
                   name="badgeCode"
                   [(ngModel)]="form.data.badgeCode"
                   placeholder="Enter Badge Code">
          </div>

          <small class="text-danger">
            {{ form.inputerror.badgeCode }}
          </small>

          <!-- Badge Name -->
          <span class="mt-2 d-block">
            <b>Badge Name</b> <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-trophy"></i>
              </div>
            </div>

            <input type="text"
                   class="form-control"
                   name="badgeName"
                   [(ngModel)]="form.data.badgeName"
                   placeholder="Enter Badge Name">
          </div>

          <small class="text-danger">
            {{ form.inputerror.badgeName }}
          </small>

          <!-- Earned By -->
          <span class="mt-2 d-block">
            <b>Earned By</b> <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-user"></i>
              </div>
            </div>

            <input type="text"
                   class="form-control"
                   name="earnedBy"
                   [(ngModel)]="form.data.earnedBy"
                   placeholder="Enter Earned By">
          </div>

          <small class="text-danger">
            {{ form.inputerror.earnedBy }}
          </small>

          <!-- Status -->
          <span class="mt-2 d-block">
            <b>Status</b> <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-check-circle"></i>
              </div>
            </div>

            <select class="form-control"
                    name="status"
                    [(ngModel)]="form.data.status">

              <option value="">
                ------------Select------------
              </option>

              <option value="Active">
                Active
              </option>

              <option value="Inactive">
                Inactive
              </option>

            </select>
          </div>

          <small class="text-danger">
            {{ form.inputerror.status }}
          </small>

          <!-- Buttons -->
          <div class="text-center mt-3">

            <button class="btn btn-success btn-md"
                    (click)="submit()">
              Save
            </button>

            &nbsp;

            <button class="btn btn-warning btn-md"
                    (click)="forward('achievementbadgelist')">
              List
            </button>

          </div>

        </div>
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>

</div>

<app-footer></app-footer>
