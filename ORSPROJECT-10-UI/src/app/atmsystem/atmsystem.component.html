<style>
  .hm {
    background-image: url('assets/img/welcome.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 150px;
    padding-bottom: 150px;
  }
</style>

<app-navbar></app-navbar>

<div class="hm">

  <div class="row">
    <div class="col-md-4"></div>

    <div class="col-md-4">
      <div class="card input-group-addon">
        <div class="card-body">

          <!-- Title -->
          <h3 class="text-center text-primary" *ngIf="!form.data.id">
            Add ATM System
          </h3>

          <h3 class="text-center text-primary" *ngIf="form.data.id > 0">
            Update ATM System
          </h3>

          <!-- Success Message -->
          <div *ngIf="!form.error && form.message"
               class="alert alert-success text-center">
            {{ form.message }}
          </div>

          <!-- Error Message -->
          <div *ngIf="form.error && form.message"
               class="alert alert-danger text-center">
            {{ form.message }}
          </div>

          <!-- Bank Name -->
          <span><b>Bank Name</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-university"></i>
              </div>
            </div>
            <input type="text"
                   class="form-control"
                   name="bankName"
                   [(ngModel)]="form.data.bankName"
                   placeholder="Enter Bank Name">
          </div>
          <small class="text-danger">{{ form.inputerror.bankName }}</small>

          <!-- Location -->
          <span class="mt-2 d-block">
            <b>Location</b> <span style="color:red">*</span>
          </span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-map-marker"></i>
              </div>
            </div>
            <input type="text"
                   class="form-control"
                   name="location"
                   [(ngModel)]="form.data.location"
                   placeholder="Enter Location">
          </div>
          <small class="text-danger">{{ form.inputerror.location }}</small>

          <!-- Cash Available -->
          <span class="mt-2 d-block">
            <b>Cash Available</b> <span style="color:red">*</span>
          </span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-money"></i>
              </div>
            </div>
            <input type="number"
                   class="form-control"
                   name="cashAvailable"
                   [(ngModel)]="form.data.cashAvailable"
                   placeholder="Enter Cash Available">
          </div>
          <small class="text-danger">{{ form.inputerror.cashAvailable }}</small>

          <!-- Security Code -->
          <span class="mt-2 d-block">
            <b>Security Code</b> <span style="color:red">*</span>
          </span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-lock"></i>
              </div>
            </div>
            <input type="number"
                   class="form-control"
                   name="securityCode"
                   [(ngModel)]="form.data.securityCode"
                   placeholder="Enter Security Code">
          </div>
          <small class="text-danger">{{ form.inputerror.securityCode }}</small>

          <!-- Buttons -->
          <div class="text-center mt-3">

            <button class="btn btn-success btn-md"
                    (click)="submit()">
              Save
            </button>

            &nbsp;

            <button class="btn btn-warning btn-md"
                    (click)="forward('ATMSystemList')">
              List
            </button>

          </div>

        </div>
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>

</div>

<app-footer></app-footer>
