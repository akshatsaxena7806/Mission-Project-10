<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card grad-card shadow-sm w-100" style="max-width: 600px;">
        <div class="card-body py-3">
            <h5 class="text-center text-success fw-bold mb-3">
                Change Password
            </h5>

            <!-- Success Message -->
            <div class="alert alert-success" *ngIf="!form.error && form.message">
                {{ form.message }}
            </div>

            <!-- Error Message -->
            <div class="alert alert-danger" *ngIf="form.error && form.message">
                {{ form.message }}
            </div>

            <form>
                <!-- Old Password -->
                <div class="mb-2">
                    <label><strong>Old Password</strong> <span class="text-danger">*</span></label>
                    <input type="password" class="form-control"
                        [(ngModel)]="form.data.oldPassword" name="oldPassword"
                        placeholder="Enter Old Password">
                    <div class="text-danger small">{{form.inputerror.oldPassword}}</div>
                </div>

                <!-- New Password -->
                <div class="mb-2">
                    <label><strong>New Password</strong> <span class="text-danger">*</span></label>
                    <input type="password" class="form-control"
                        [(ngModel)]="form.data.newPassword" name="newPassword"
                        placeholder="Enter New Password">
                    <div class="text-danger small">{{form.inputerror.newPassword}}</div>
                </div>

                <!-- Button -->
                <div class="text-center mt-3">
                    <button type="button" class="btn btn-success px-4"
                        (click)="changePassword()">
                        Change Password
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
