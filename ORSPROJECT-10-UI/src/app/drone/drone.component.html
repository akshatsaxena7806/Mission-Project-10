<style>
  .hm {
    background-image: url('assets/img/welcome.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 150px;
    padding-bottom: 150px;
  }
</style>

<app-navbar></app-navbar>

<div class="hm">

  <div class="row">
    <div class="col-md-4"></div>

    <div class="col-md-4">
      <div class="card input-group-addon">
        <div class="card-body">

          <!-- Title -->
          <h3 class="text-center text-primary" *ngIf="!form.data.id">
            Add Drone
          </h3>

          <h3 class="text-center text-primary" *ngIf="form.data.id > 0">
            Update Drone
          </h3>

          <!-- Success Message -->
          <div *ngIf="!form.error && form.message"
               class="alert alert-success text-center">
            {{ form.message }}
          </div>

          <!-- Error Message -->
          <div *ngIf="form.error && form.message"
               class="alert alert-danger text-center">
            {{ form.message }}
          </div>

          <!-- Drone Code -->
          <span><b>Drone Code</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-helicopter"></i>
              </div>
            </div>
            <input type="text"
                   class="form-control"
                   name="droneCode"
                   [(ngModel)]="form.data.droneCode"
                   placeholder="Enter Drone Code">
          </div>
          <small class="text-danger">
            {{ form.inputerror.droneCode }}
          </small>

          <!-- Operator Name -->
          <span class="mt-2 d-block">
            <b>Operator Name</b> <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-user"></i>
              </div>
            </div>

            <input type="text"
                   class="form-control"
                   name="operatorName"
                   [(ngModel)]="form.data.operatorName"
                   placeholder="Enter Operator Name">
          </div>

          <small class="text-danger">
            {{ form.inputerror.operatorName }}
          </small>

          <!-- Delivery Zone -->
          <span class="mt-2 d-block">
            <b>Delivery Zone</b> <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-map-marker"></i>
              </div>
            </div>

            <input type="text"
                   class="form-control"
                   name="deliveryZone"
                   [(ngModel)]="form.data.deliveryZone"
                   placeholder="Enter Delivery Zone">
          </div>

          <small class="text-danger">
            {{ form.inputerror.deliveryZone }}
          </small>

          <!-- Status -->
          <span class="mt-2 d-block">
            <b>Status</b> <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-info-circle"></i>
              </div>
            </div>

            <select class="form-control"
                    name="status"
                    [(ngModel)]="form.data.status">

              <option value="undefined">
                ------------Select------------
              </option>

              <option value="Available">
                Available
              </option>

              <option value="Busy">
                Busy
              </option>

              <option value="Maintenance">
                Maintenance
              </option>

            </select>
          </div>

          <small class="text-danger">
            {{ form.inputerror.status }}
          </small>

          <!-- Buttons -->
          <div class="text-center mt-3">

            <button class="btn btn-success btn-md"
                    (click)="submit()">
              Save
            </button>

            &nbsp;

            <button class="btn btn-warning btn-md"
                    (click)="forward('dronelist')">
              List
            </button>

          </div>

        </div>
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>

</div>

<app-footer></app-footer>
