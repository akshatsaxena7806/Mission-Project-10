<style>
  .hm {
    background-image: url('assets/img/welcome.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 150px;
    padding-bottom: 150px;
  }
</style>

<app-navbar></app-navbar>

<div class="hm">

  <div class="row">
    <div class="col-md-4"></div>

    <div class="col-md-4">
      <div class="card input-group-addon">
        <div class="card-body">

          <!-- Title -->
          <h3 class="text-center text-primary" *ngIf="!form.data.id">
            Add Course
          </h3>

          <h3 class="text-center text-primary" *ngIf="form.data.id > 0">
            Update Course
          </h3>

          <!-- Success Message -->
          <div *ngIf="!form.error && form.message"
               class="alert alert-success text-center">
            {{ form.message }}
          </div>

          <!-- Error Message -->
          <div *ngIf="form.error && form.message"
               class="alert alert-danger text-center">
            {{ form.message }}
          </div>

          <!-- Course Name -->
          <span><b>Course Name</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-book"></i>
              </div>
            </div>
            <input type="text" class="form-control"
                   name="name"
                   [(ngModel)]="form.data.name"
                   placeholder="Enter Course Name">
          </div>
          <small class="text-danger">{{ form.inputerror.name }}</small>

          <!-- Duration -->
          <span class="mt-2 d-block"><b>Duration</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-clock"></i>
              </div>
            </div>
            <select class="form-control"
                    name="duration"
                    [(ngModel)]="form.data.duration">
              <option value="undefined">------------Select------------</option>
              <option [value]="1">1 Year</option>
              <option [value]="2">2 Year</option>
              <option [value]="3">3 Year</option>
              <option [value]="4">4 Year</option>
              <option [value]="5">5 Year</option>
            </select>
          </div>
          <small class="text-danger">{{ form.inputerror.duration }}</small>

          <!-- Description -->
          <span class="mt-2 d-block"><b>Description</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-align-left"></i>
              </div>
            </div>
            <textarea class="form-control"
                      name="description"
                      [(ngModel)]="form.data.description"
                      rows="3"
                      placeholder="Enter short description"></textarea>
          </div>
          <small class="text-danger">{{ form.inputerror.description }}</small>

          <!-- Buttons -->
          <div class="text-center mt-3">

            <button class="btn btn-success btn-md"
                    (click)="submit()">
              Save
            </button>

            &nbsp;

            <button class="btn btn-warning btn-md"
                    (click)="forward('courselist')">
              List
            </button>

          </div>

        </div>
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>

</div>

<app-footer></app-footer>
