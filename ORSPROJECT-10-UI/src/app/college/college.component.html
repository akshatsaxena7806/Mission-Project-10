<style>
    .hm {
  background-image: url('assets/img/welcome.png');
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: cover;
  padding-top: 150px;
  padding-bottom: 150px;
}
</style>

<app-navbar></app-navbar>

<div class="hm">

  <div class="row pt-3">
    <div class="col-md-4"></div>

    <div class="col-md-4">
      <div class="card input-group-addon">
        <div class="card-body">

          <!-- Title -->
          <h3 class="text-center text-primary" *ngIf="!form.data.id">
            Add College
          </h3>

          <h3 class="text-center text-primary" *ngIf="form.data.id > 0">
            Update College
          </h3>

          <!-- Success Message -->
          <div *ngIf="!form.error && form.message"
               class="alert alert-success text-center">
            {{ form.message }}
          </div>

          <!-- Error Message -->
          <div *ngIf="form.error && form.message"
               class="alert alert-danger text-center">
            {{ form.message }}
          </div>

          <!-- College Name -->
          <span><b>College Name</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-university"></i>
              </div>
            </div>
            <input type="text" class="form-control"
                   name="name"
                   [(ngModel)]="form.data.name"
                   placeholder="Enter College Name">
          </div>
          <small class="text-danger">{{ form.inputerror.name }}</small>

          <!-- Address -->
          <span class="mt-2 d-block"><b>Address</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-map-marker-alt"></i>
              </div>
            </div>
            <input type="text" class="form-control"
                   name="address"
                   [(ngModel)]="form.data.address"
                   placeholder="Enter Address">
          </div>
          <small class="text-danger">{{ form.inputerror.address }}</small>

          <!-- State -->
          <span class="mt-2 d-block"><b>State</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-map"></i>
              </div>
            </div>
            <input type="text" class="form-control"
                   name="state"
                   [(ngModel)]="form.data.state"
                   placeholder="Enter State">
          </div>
          <small class="text-danger">{{ form.inputerror.state }}</small>

          <!-- City -->
          <span class="mt-2 d-block"><b>City</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-city"></i>
              </div>
            </div>
            <input type="text" class="form-control"
                   name="city"
                   [(ngModel)]="form.data.city"
                   placeholder="Enter City">
          </div>
          <small class="text-danger">{{ form.inputerror.city }}</small>

          <!-- Phone -->
          <span class="mt-2 d-block"><b>Phone No</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-phone"></i>
              </div>
            </div>
            <input type="text" class="form-control"
                   name="phoneNo"
                   [(ngModel)]="form.data.phoneNo"
                   maxlength="10"
                   placeholder="Enter Phone No">
          </div>
          <small class="text-danger">{{ form.inputerror.phoneNo }}</small>

          <!-- Buttons -->
          <div class="text-center mt-3">

            <button class="btn btn-success btn-md"
                    (click)="submit()">
              Save
            </button>

            &nbsp;

            <button class="btn btn-warning btn-md"
                    (click)="forward('/collegelist')">
              List
            </button>

          </div>

        </div>
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>

</div>

<app-footer></app-footer>
