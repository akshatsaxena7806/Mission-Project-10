<style>
  .hm {
    background-image: url('assets/img/welcome.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 150px;
    padding-bottom: 150px;
  }
</style>

<app-navbar></app-navbar>

<div class="hm">

  <div class="row">
    <div class="col-md-4"></div>

    <div class="col-md-4">
      <div class="card input-group-addon">
        <div class="card-body">

          <!-- Title -->
          <h3 class="text-center text-primary" *ngIf="!form.data.id">
            Add Employee
          </h3>

          <h3 class="text-center text-primary" *ngIf="form.data.id > 0">
            Update Employee
          </h3>

          <!-- Success Message -->
          <div *ngIf="!form.error && form.message"
               class="alert alert-success text-center">
            {{ form.message }}
          </div>

          <!-- Error Message -->
          <div *ngIf="form.error && form.message"
               class="alert alert-danger text-center">
            {{ form.message }}
          </div>

          <!-- Employee Code -->
          <span><b>Employee Code</b> <span style="color:red">*</span></span>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-id-badge"></i>
              </div>
            </div>

            <input type="text"
                   class="form-control"
                   name="employeeCode"
                   [(ngModel)]="form.data.employeeCode"
                   placeholder="Enter Employee Code">
          </div>

          <small class="text-danger">
            {{ form.inputerror.employeeCode }}
          </small>

          <!-- Employee Name -->
          <span class="mt-2 d-block">
            <b>Employee Name</b>
            <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-user"></i>
              </div>
            </div>

            <input type="text"
                   class="form-control"
                   name="employeeName"
                   [(ngModel)]="form.data.employeeName"
                   placeholder="Enter Employee Name">
          </div>

          <small class="text-danger">
            {{ form.inputerror.employeeName }}
          </small>

          <!-- State -->
          <span class="mt-2 d-block">
            <b>State</b>
            <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-exclamation-triangle"></i>
              </div>
            </div>

            <select class="form-control"
                    name="ChurnkRisk"
                    [(ngModel)]="form.data.state">

              <option value="undefined">
                ------------Select------------
              </option>

              <option value="madhyapradesh">madhyapradesh</option>
              <option value="chattisgarh">chattisgarh</option>
              <option value="utrakhand">utrakhand</option>
              <option value="bihar">bihar</option>
            </select>
          </div>


          <small class="text-danger">
            {{ form.inputerror.state }}
          </small>

          <!-- City -->
          <span class="mt-2 d-block">
            <b>City</b>
            <span style="color:red">*</span>
          </span>

          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">
                <i class="fa fa-building"></i>
              </div>
            </div>

            <input type="text"
                   class="form-control"
                   name="city"
                   [(ngModel)]="form.data.city"
                   placeholder="Enter City">
          </div>

          <small class="text-danger">
            {{ form.inputerror.city }}
          </small>

          <!-- Buttons -->
          <div class="text-center mt-3">

            <button class="btn btn-success btn-md"
                    (click)="submit()">
              Save
            </button>

            &nbsp;

            <button class="btn btn-warning btn-md"
                    (click)="forward('Employeelist')">
              List
            </button>

          </div>

        </div>
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>

</div>

<app-footer></app-footer>
